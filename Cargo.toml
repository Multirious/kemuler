[package]
name = "kemuler"
version = "0.1.0"
edition = "2021"
description = "High level input emulation tool"
authors = [ "Multirious" ]

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
cfg-if = "1.0.0"
enigo = { version = "0.1.1", optional = true }
once_cell = "1.17.1"
rdev = { version = "0.5.2", optional = true }

[features]
default = ["enigo", "rdev"]
enigo = ["dep:enigo"]
rdev = ["dep:rdev"]
